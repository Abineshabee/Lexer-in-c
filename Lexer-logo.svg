<svg width="520" height="220" viewBox="0 0 520 220" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="transparent"></rect>

  <!-- code line -->
  <text x="260" y="100" font-family="monospace" font-size="20" fill="white" text-anchor="middle">
    int main() { return 0; }
  </text>

  <!-- tokens (underline) -->
  <rect x="157.5" y="120" width="40" height="10" fill="#00cc7a" fill-opacity="0.2">
    <animate attributeName="fill-opacity" values="0.2;1;0.2" dur="4s" begin="0.41s" repeatCount="indefinite"></animate>
    <animate attributeName="fill" values="#00cc7a;#00ff66;#00cc7a" dur="4s" begin="0.41s" repeatCount="indefinite"></animate>
  </rect>
  <rect x="202.5" y="120" width="45" height="10" fill="#00cc7a" fill-opacity="0.2">
    <animate attributeName="fill-opacity" values="0.2;1;0.2" dur="4s" begin="1.39s" repeatCount="indefinite"></animate>
    <animate attributeName="fill" values="#00cc7a;#00ff66;#00cc7a" dur="4s" begin="1.39s" repeatCount="indefinite"></animate>
  </rect>
  <rect x="252.5" y="120" width="35" height="10" fill="#00cc7a" fill-opacity="0.2">
    <animate attributeName="fill-opacity" values="0.2;1;0.2" dur="4s" begin="2.34s" repeatCount="indefinite"></animate>
    <animate attributeName="fill" values="#00cc7a;#00ff66;#00cc7a" dur="4s" begin="2.34s" repeatCount="indefinite"></animate>
  </rect>
  <rect x="292.5" y="120" width="20" height="10" fill="#00cc7a" fill-opacity="0.2">
    <animate attributeName="fill-opacity" values="0.2;1;0.2" dur="4s" begin="2.96s" repeatCount="indefinite"></animate>
    <animate attributeName="fill" values="#00cc7a;#00ff66;#00cc7a" dur="4s" begin="2.96s" repeatCount="indefinite"></animate>
  </rect>
  <rect x="317.5" y="120" width="45" height="10" fill="#00cc7a" fill-opacity="0.2">
    <animate attributeName="fill-opacity" values="0.2;1;0.2" dur="4s" begin="3.72s" repeatCount="indefinite"></animate>
    <animate attributeName="fill" values="#00cc7a;#00ff66;#00cc7a" dur="4s" begin="3.72s" repeatCount="indefinite"></animate>
  </rect>

  <!-- scanning bar -->
  <rect x="157.5" y="70" width="6" height="80" fill="#00ff66" opacity="0">
    <animate attributeName="x" from="157.5" to="352.5" dur="4s" repeatCount="indefinite"></animate>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.05;0.95;1" dur="4s" repeatCount="indefinite"></animate>
  </rect>

  <!-- title -->
  <text x="260" y="200" font-family="Segoe UI, Arial" font-size="28" font-weight="700" fill="white" text-anchor="middle" letter-spacing="3">
    C Lexer
  </text>

  <!-- subtitle -->
  <text x="260" y="215" font-family="Segoe UI, Arial" font-size="7" fill="#00ff66" text-anchor="middle" letter-spacing="3">
    TOKENIZER FOR C/C++ SOURCE CODE
  </text>
</svg>